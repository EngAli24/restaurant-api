<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلبات | لوحة الإدارة</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff4757">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container { max-width: 1100px; margin: 2rem auto; padding: 0 20px; }
        .admin-card { background: var(--white); padding: 2rem; border-radius: 12px; box-shadow: var(--shadow); }
        .admin-card h2 { color: var(--secondary-color); margin-bottom: 1.5rem; border-bottom: 2px solid #f1f2f6; padding-bottom: 10px; }
        
        .orders-table { width: 100%; border-collapse: collapse; min-width: 800px; }
        .orders-table th, .orders-table td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        .orders-table th { background-color: #f8f9fa; color: var(--secondary-color); font-weight: bold; }
        .status-select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-family: 'Cairo', sans-serif; outline: none; }
        .status-select:disabled { background: #eee; cursor: not-allowed; }
        .update-btn { background: var(--secondary-color); color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .update-btn:hover { background: #2f3640; }
        .locked-btn { background: #ccc; cursor: not-allowed; color: #666; padding: 8px 12px; border-radius: 5px; border: none; font-weight: bold;}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">إدارة الطلبات 🛵</div>
        <ul class="nav-links">
            <li><a href="/admin">العودة للوحة الإدارة</a></li>
            <li><a href="/">الموقع الرئيسي</a></li>
        </ul>
    </nav>

    <div class="admin-container">
        <div class="admin-card">
            <h2>الطلبات الحالية والسابقة</h2>
            <div style="overflow-x: auto;">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>رقم الطلب</th>
                            <th>العميل</th>
                            <th>العنوان</th>
                            <th>الإجمالي</th>
                            <th>الحالة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="orders-list">
                        <tr><td colspan="6" style="text-align: center;">جاري تحميل الطلبات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/orders.js"></script>
</body>
</html>
