<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعمنا | الرئيسية</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff4757">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .category-filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; border-bottom: 2px solid #f1f2f6; padding-bottom: 10px; }
        .filter-btn { background: none; border: none; font-family: 'Cairo', sans-serif; font-size: 1.2rem; font-weight: 600; color: #7f8fa6; cursor: pointer; padding: 8px 15px; transition: 0.3s; position: relative; }
        .filter-btn:hover { color: var(--primary-color); }
        .filter-btn.active { color: var(--primary-color); }
        .filter-btn.active::after { content: ''; position: absolute; bottom: -12px; left: 0; width: 100%; height: 3px; background-color: var(--primary-color); border-radius: 5px; }
    </style>
</head>
<body>

    <nav class="navbar">
    <div class="logo">مطعمنا 🍔</div>
    <ul class="nav-links">
        <li><a href="/login" style="font-size: 1.2rem;" title="البروفايل">👤</a></li>
        <li><a href="javascript:void(0)" id="cart-btn" onclick="toggleCart()" style="font-size: 1.2rem;" title="السلة">🛒 (<span id="cart-count">0</span>)</a></li>
        <li><a href="/login" class="login-btn">تسجيل الدخول</a></li>
    </ul>
</nav>

    <header class="hero">
        <div class="hero-content">
            <h1>اكتشف أشهى المأكولات</h1>
            <p>نقدم لك أفضل الوجبات المحضرة بعناية من أجود المكونات الطازجة. اطلب الآن واستمتع!</p>
        </div>
    </header>

    <main class="container">
        <div class="section-title">
            <h2>قائمة الطعام</h2>
            <div class="underline"></div>
        </div>

        <div id="category-filters" class="category-filters"></div>
        
        <div id="menu-container" style="display: block; width: 100%;">
            <div class="loader">جاري تحميل أشهى الأطباق...</div>
        </div>
    </main>
    
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleCart()">&times;</span>
            <h2>🛒 سلة المشتريات</h2>
            <div id="cart-items"></div>
            <div class="cart-summary">
                <h3>الإجمالي: <span id="cart-total">0</span> ج.م</h3>
                <button class="checkout-btn" onclick="checkout()">إتمام الطلب الآن</button>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
