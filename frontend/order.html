<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعمنا | تم تأكيد الطلب</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff4757">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .success-container { text-align: center; margin: 15vh auto; padding: 2rem; max-width: 500px; background: var(--white); border-radius: 12px; box-shadow: var(--shadow); }
        .success-icon { font-size: 80px; margin-bottom: 20px; }
        .success-container h1 { color: var(--secondary-color); margin-bottom: 10px; }
        .success-container p { color: #777; margin-bottom: 30px; font-size: 1.1rem; }
        .back-btn { background: var(--primary-color); color: white; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: var(--transition); }
        .back-btn:hover { background-color: #ee5253; }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">🎉</div>
        <h1>تم استلام طلبك بنجاح!</h1>
        <p>فريقنا بدأ بتجهيز وجبتك اللذيذة، سيتم التواصل معك قريباً على رقم الهاتف الخاص بك.</p>
        <a href="/" class="back-btn">العودة للصفحة الرئيسية</a>
    </div>
</body>
</html>
